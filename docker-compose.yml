version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: order-product-n8n
    ports:
      - "5678:5678"
    volumes:
      - ~/.n8n:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PROTOCOL=http
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - order-product-network

networks:
  order-product-network:
    driver: bridge
